<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>COVID-19 Thematic Maps (US, 2020)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 32px 18px;
            font-family: 'Open Sans', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .wrap {
            max-width: 760px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 22pt;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        p {
            margin: 0 0 16px 0;
            color: rgba(226,232,240,0.85);
            line-height: 1.55;
        }
        .links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 18px;
        }
        a.card {
            display: block;
            padding: 14px 16px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            color: #e2e8f0;
            text-decoration: none;
        }
        a.card:hover {
            background: rgba(255,255,255,0.09);
        }
        .card strong {
            display: block;
            font-size: 12.5pt;
            margin-bottom: 4px;
        }
        .card span {
            font-size: 10.5pt;
            color: rgba(226,232,240,0.75);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>COVID-19 Thematic Maps (US, 2020)</h1>
        <p>Interactive county-level maps built with Mapbox GL JS (Albers projection).</p>

        <div class="links">
            <a class="card" href="map1.html">
                <strong>Map 1: Case Rates</strong>
                <span>Choropleth of cases per 1,000 residents</span>
            </a>
            <a class="card" href="map2.html">
                <strong>Map 2: Confirmed Cases</strong>
                <span>Proportional symbols of total confirmed cases</span>
            </a>
        </div>
    </div>
</body>

</html>
